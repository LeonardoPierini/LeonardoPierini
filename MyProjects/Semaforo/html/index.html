<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semáforo</title>
    <link rel="stylesheet" href="../Css/style.css">
</head>
<body>
    <main>

        <!-- imagem do semaforo desligado -->
        <div>
            <img src="../imgs/desligado.png" id='img' >
        </div>

        <!-- Botões de comando de cores do semaforo -->
        <div id='buttons'>
            <button id='red' class="button" >Vermelho</button>
            <button id='yellow' class="button" >Amarelo</button>
            <button id='green' class="button" >Verde</button>
            <button name='teste' id='automatic' class="button" >Automático</button>
        </div>
    </main>

    <script src="../js/script.js"></script>
</body>
</html>
